<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <radialGradient id="bg" cx="48%" cy="46%" r="72%">
      <stop offset="0%" stop-color="#1a1208"/>
      <stop offset="100%" stop-color="#05070C"/>
    </radialGradient>
    <radialGradient id="candle-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8B84B" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#C9943A" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#C9943A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D7A4A" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#3D7A4A" stop-opacity="0"/>
    </radialGradient>
    <filter id="f1"><feGaussianBlur stdDeviation="42"/></filter>
    <filter id="f2"><feGaussianBlur stdDeviation="18"/></filter>
    <filter id="f3"><feGaussianBlur stdDeviation="7"/></filter>
    <filter id="fg"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="600" height="400" fill="url(#bg)"/>
  <!-- Main candle atmosphere glow -->
  <ellipse cx="440" cy="188" rx="180" ry="200" fill="url(#candle-glow)" filter="url(#f1)"/>
  <!-- Dragon-side cool glow -->
  <ellipse cx="150" cy="290" rx="140" ry="120" fill="url(#gg)" filter="url(#f2)"/>

  <!-- WRITING DESK surface -->
  <rect x="80" y="284" width="440" height="18" rx="3" fill="#1e1608"/>
  <rect x="80" y="300" width="440" height="7" rx="2" fill="#120e04"/>
  <rect x="108" y="307" width="12" height="65" rx="2" fill="#1e1608"/>
  <rect x="480" y="307" width="12" height="65" rx="2" fill="#1e1608"/>
  <!-- Warm candle pool on desk surface -->
  <ellipse cx="440" cy="288" rx="160" ry="14" fill="#E8B84B" fill-opacity="0.1" filter="url(#f2)"/>

  <!-- CANDLE STICK BASE -->
  <ellipse cx="442" cy="282" rx="20" ry="6" fill="#2a1a08"/>
  <rect x="430" y="254" width="24" height="30" rx="4" fill="#221408"/>
  <ellipse cx="442" cy="253" rx="22" ry="7" fill="#2a1a08"/>
  <!-- Candle body -->
  <rect x="432" y="176" width="20" height="80" rx="5" fill="#DEC991" opacity="0.85"/>
  <!-- Wax drip left -->
  <path d="M434 190 C431 202 429 210 432 218 L434 218 Z" fill="#E8D5A0" opacity="0.5"/>
  <!-- Wax drip right -->
  <path d="M450 196 C453 208 455 216 452 224 L450 224 Z" fill="#E8D5A0" opacity="0.45"/>
  <!-- Wick -->
  <line x1="442" y1="176" x2="442" y2="163" stroke="#1a1008" stroke-width="2.5"/>
  <!-- Flame outer (blurred) -->
  <path d="M434 162 C431 148 436 136 442 130 C448 136 453 148 450 162 Z" fill="#E8B84B" opacity="0.65" filter="url(#f3)"/>
  <!-- Flame inner (sharp) -->
  <path d="M437 162 C436 151 439 142 442 137 C445 142 448 151 447 162 Z" fill="#FFF5CC" opacity="0.92"/>
  <!-- Flame core -->
  <ellipse cx="442" cy="155" rx="3" ry="5" fill="#fff" opacity="0.7"/>
  <!-- Large candle glow (atmosphere) -->
  <circle cx="442" cy="148" rx="75" ry="75" fill="#E8B84B" opacity="0.18" filter="url(#f2)"/>

  <!-- STACKED BOOKS (left side) -->
  <!-- Book 1 (bottom, largest, dark teal) -->
  <rect x="106" y="228" width="76" height="56" rx="3" fill="#0e1410"/>
  <rect x="106" y="228" width="76" height="9" rx="2" fill="#162010"/>
  <rect x="106" y="232" width="76" height="3" rx="1" fill="#2d6a2d" opacity="0.45"/>
  <!-- Book 2 (middle, dark red) -->
  <rect x="110" y="184" width="70" height="46" rx="3" fill="#140a08"/>
  <rect x="110" y="184" width="70" height="8" rx="2" fill="#1e0e0a"/>
  <rect x="110" y="188" width="70" height="3" rx="1" fill="#8B1A1A" opacity="0.45"/>
  <!-- Bookmark ribbon -->
  <rect x="162" y="184" width="4" height="34" rx="1" fill="#8B1A1A" opacity="0.75"/>
  <!-- Book 3 (top, thin, navy) -->
  <rect x="114" y="162" width="66" height="24" rx="2" fill="#0a0e18"/>
  <rect x="114" y="162" width="66" height="6" rx="2" fill="#0e1428"/>
  <rect x="114" y="165" width="66" height="2" rx="1" fill="#1a3a6a" opacity="0.5"/>

  <!-- SCROLL (center, main focal element) -->
  <!-- Scroll shadow -->
  <ellipse cx="308" cy="282" rx="98" ry="10" fill="#000" opacity="0.3"/>
  <!-- Scroll body (parchment) -->
  <rect x="220" y="168" width="176" height="116" rx="5" fill="#EDD99A"/>
  <!-- Parchment age tint -->
  <rect x="220" y="168" width="176" height="116" rx="5" fill="#8B6914" opacity="0.1"/>
  <!-- Rolled scroll ends -->
  <ellipse cx="220" cy="226" rx="10" ry="58" fill="#D4C07A"/>
  <ellipse cx="396" cy="226" rx="10" ry="58" fill="#D4C07A"/>
  <!-- Inner shadow (depth) -->
  <rect x="230" y="170" width="156" height="112" rx="3" fill="#C9A85C" opacity="0.1"/>
  <!-- Horizontal guide lines on scroll -->
  <line x1="240" y1="190" x2="376" y2="190" stroke="#8B6914" stroke-width="1" opacity="0.3"/>
  <line x1="240" y1="206" x2="376" y2="206" stroke="#8B6914" stroke-width="1" opacity="0.25"/>
  <line x1="240" y1="222" x2="376" y2="222" stroke="#8B6914" stroke-width="1" opacity="0.25"/>
  <line x1="240" y1="238" x2="376" y2="238" stroke="#8B6914" stroke-width="1" opacity="0.25"/>
  <line x1="240" y1="254" x2="340" y2="254" stroke="#8B6914" stroke-width="1" opacity="0.2"/>
  <!-- Title text on scroll -->
  <text x="308" y="187" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#4a2a08" opacity="0.75" letter-spacing="2" font-weight="bold">7 DNÍ U ŠTĚTCE</text>
  <!-- Subtitle hint -->
  <text x="308" y="203" text-anchor="middle" font-family="Georgia,serif" font-size="7.5" fill="#6a4010" opacity="0.5" letter-spacing="1">každý den jeden krok</text>
  <!-- Decorative line under title -->
  <line x1="258" y1="193" x2="358" y2="193" stroke="#8B6914" stroke-width="1" opacity="0.4"/>
  <!-- Wavy writing (3 lines) -->
  <path d="M248 214 C260 212 272 216 284 213 C296 210 308 214 320 212 C332 210 344 213 358 211" stroke="#8B6914" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.35"/>
  <path d="M248 228 C262 226 274 230 286 227 C298 224 310 228 322 226 C334 224 346 227 358 225" stroke="#8B6914" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.3"/>
  <path d="M248 242 C264 240 276 244 288 241 C300 238 312 242 324 240 C336 238 346 241 358 239" stroke="#8B6914" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.25"/>
  <!-- Wax seal -->
  <circle cx="360" cy="262" r="13" fill="#7D2128" opacity="0.85"/>
  <circle cx="360" cy="262" r="9" fill="none" stroke="#C9943A" stroke-width="1" opacity="0.65"/>
  <path d="M355 262 L360 254 L365 262 L360 270 Z" fill="#C9943A" opacity="0.55"/>

  <!-- QUILL PEN (diagonal on scroll) -->
  <g transform="rotate(-32 308 240)">
    <path d="M266 240 C285 226 312 224 325 236 C312 250 286 252 270 246 Z" fill="#E8D5A0" opacity="0.88"/>
    <line x1="325" y1="236" x2="268" y2="244" stroke="#8B6914" stroke-width="1.5" opacity="0.65"/>
    <path d="M268 244 L253 249 L261 259 Z" fill="#6a5010" opacity="0.78"/>
    <line x1="253" y1="249" x2="261" y2="258" stroke="#C9943A" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- INK BOTTLE (right of books) -->
  <ellipse cx="202" cy="280" rx="14" ry="5" fill="#1a1008" opacity="0.9"/>
  <rect x="188" y="244" width="28" height="36" rx="6" fill="#12100a" opacity="0.92"/>
  <rect x="192" y="238" width="20" height="10" rx="4" fill="#1a1808" opacity="0.9"/>
  <ellipse cx="202" cy="248" rx="10" ry="4" fill="#12100a" opacity="0.8"/>
  <ellipse cx="202" cy="254" rx="8" ry="3" fill="#C9943A" opacity="0.1"/>

  <!-- DRAGON (small, upper left, watching scroll) -->
  <path d="M156 228 C149 210 153 196 164 192 C175 188 186 196 187 209 C188 222 182 233 170 237 C163 239 156 234 156 228 Z" fill="#1a4a2a" opacity="0.9"/>
  <path d="M186 209 C197 200 212 198 216 208 C205 215 190 213 187 211 Z" fill="#153a20" opacity="0.7"/>
  <path d="M156 212 C145 204 130 203 126 212 C137 219 153 217 155 214 Z" fill="#153a20" opacity="0.7"/>
  <path d="M152 192 C148 182 152 174 162 172 C172 170 179 176 178 186 C177 193 170 196 164 195 Z" fill="#246030" opacity="0.9"/>
  <!-- Dragon eye (looking at scroll) -->
  <ellipse cx="166" cy="180" rx="6" ry="5" fill="#E8B84B" opacity="0.96" filter="url(#fg)"/>
  <ellipse cx="166" cy="180" rx="2.5" ry="3.5" fill="#080506"/>
  <circle cx="166" cy="180" r="11" fill="#E8B84B" opacity="0.22" filter="url(#f2)"/>
  <!-- Dragon tail -->
  <path d="M163 233 C168 247 161 260 153 261 C149 251 152 240 158 235 Z" fill="#1a4a2a" opacity="0.8"/>

  <!-- Scattered ink drops -->
  <circle cx="214" cy="278" r="2.5" fill="#12100a" opacity="0.85"/>
  <circle cx="222" cy="274" r="2" fill="#12100a" opacity="0.65"/>
  <circle cx="209" cy="272" r="1.5" fill="#C9943A" opacity="0.35"/>

  <!-- Floating particles (in candle light) -->
  <circle cx="378" cy="168" r="1.5" fill="#E8B84B" opacity="0.6"/>
  <circle cx="416" cy="140" r="1" fill="#E8B84B" opacity="0.5"/>
  <circle cx="462" cy="172" r="1.5" fill="#E8B84B" opacity="0.42"/>
  <circle cx="400" cy="204" r="1" fill="#C9943A" opacity="0.4"/>
  <circle cx="340" cy="138" r="1.5" fill="#E8B84B" opacity="0.32"/>
  <circle cx="300" cy="156" r="1" fill="#E8B84B" opacity="0.3"/>
</svg>
