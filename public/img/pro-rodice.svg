<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 520" width="700" height="520">
  <defs>
    <radialGradient id="bg" cx="50%" cy="60%" r="75%">
      <stop offset="0%" stop-color="#1a1005"/>
      <stop offset="100%" stop-color="#060402"/>
    </radialGradient>
    <radialGradient id="tableGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9943A" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#C9943A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lampGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8B84B" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#E8B84B" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="30"/></filter>
    <filter id="blurSm"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="softglow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="700" height="520" fill="url(#bg)"/>

  <!-- Background wall -->
  <rect x="0" y="0" width="700" height="340" fill="#100d08" opacity="0.8"/>

  <!-- Window in background -->
  <rect x="480" y="30" width="160" height="200" rx="6" fill="#0d1520" opacity="0.8"/>
  <rect x="490" y="40" width="140" height="180" rx="4" fill="#0a1018" opacity="0.7"/>
  <!-- Window cross -->
  <rect x="488" y="128" width="144" height="4" fill="#2a1f0a" opacity="0.8"/>
  <rect x="558" y="38" width="4" height="184" fill="#2a1f0a" opacity="0.8"/>
  <!-- Night sky through window -->
  <rect x="492" y="44" width="64" height="82" rx="2" fill="#03050e" opacity="0.9"/>
  <rect x="492" y="134" width="64" height="82" rx="2" fill="#03050e" opacity="0.9"/>
  <rect x="562" y="44" width="62" height="82" rx="2" fill="#03050e" opacity="0.9"/>
  <rect x="562" y="134" width="62" height="82" rx="2" fill="#03050e" opacity="0.9"/>
  <!-- Moon in window -->
  <circle cx="590" cy="80" r="22" fill="#c8d4f4" opacity="0.12"/>
  <circle cx="590" cy="80" r="16" fill="#c8d4f4" opacity="0.15"/>
  <!-- Stars in window -->
  <circle cx="510" cy="60" r="1" fill="white" opacity="0.5"/>
  <circle cx="525" cy="90" r="1.2" fill="white" opacity="0.4"/>
  <circle cx="580" cy="150" r="1" fill="white" opacity="0.4"/>
  <circle cx="620" cy="68" r="1" fill="white" opacity="0.5"/>

  <!-- Bookshelf on wall left -->
  <rect x="20" y="80" width="180" height="240" rx="3" fill="#1a1408" opacity="0.9"/>
  <rect x="25" y="85" width="170" height="230" rx="2" fill="#14100a" opacity="0.8"/>
  <!-- Shelf boards -->
  <rect x="20" y="148" width="180" height="7" rx="1" fill="#2a1f0a" opacity="0.9"/>
  <rect x="20" y="218" width="180" height="7" rx="1" fill="#2a1f0a" opacity="0.9"/>
  <rect x="20" y="285" width="180" height="7" rx="1" fill="#2a1f0a" opacity="0.9"/>
  <!-- Books row 1 -->
  <rect x="30" y="94" width="20" height="52" rx="1" fill="#8B1A1A" opacity="0.75"/>
  <rect x="52" y="98" width="16" height="48" rx="1" fill="#1a3a6a" opacity="0.75"/>
  <rect x="70" y="92" width="22" height="54" rx="1" fill="#2a5a2a" opacity="0.7"/>
  <rect x="94" y="96" width="18" height="50" rx="1" fill="#4a2a6a" opacity="0.7"/>
  <rect x="114" y="100" width="14" height="46" rx="1" fill="#6a4a10" opacity="0.75"/>
  <rect x="130" y="94" width="20" height="52" rx="1" fill="#8B1A1A" opacity="0.6"/>
  <rect x="152" y="98" width="18" height="48" rx="1" fill="#1a1a4a" opacity="0.7"/>
  <!-- Books row 2 -->
  <rect x="30" y="158" width="16" height="56" rx="1" fill="#2a4a2a" opacity="0.7"/>
  <rect x="48" y="163" width="20" height="51" rx="1" fill="#6a1010" opacity="0.7"/>
  <rect x="70" y="156" width="15" height="58" rx="1" fill="#1a2a5a" opacity="0.75"/>
  <rect x="87" y="161" width="22" height="53" rx="1" fill="#5a3a10" opacity="0.7"/>
  <rect x="111" y="158" width="18" height="56" rx="1" fill="#2a1a5a" opacity="0.7"/>
  <rect x="131" y="163" width="14" height="51" rx="1" fill="#4a1a1a" opacity="0.7"/>
  <rect x="147" y="157" width="20" height="57" rx="1" fill="#1a4a2a" opacity="0.65"/>

  -- Figurine display row 3 -->
  <!-- Small knight -->
  <ellipse cx="50" cy="284" rx="10" ry="3" fill="#2a2010" opacity="0.7"/>
  <rect x="44" y="260" width="12" height="24" rx="2" fill="#3a4a3a" opacity="0.8"/>
  <ellipse cx="50" cy="258" rx="7" ry="8" fill="#3a4a3a" opacity="0.8"/>
  <rect x="47" y="254" width="6" height="5" rx="1" fill="#5a6a4a" opacity="0.7"/>
  <!-- Small mage -->
  <ellipse cx="90" cy="283" rx="10" ry="3" fill="#2a2010" opacity="0.7"/>
  <rect x="84" y="262" width="12" height="22" rx="2" fill="#3a2a5a" opacity="0.8"/>
  <ellipse cx="90" cy="260" rx="7" ry="8" fill="#2a1a4a" opacity="0.8"/>
  <!-- Dragon figurine -->
  <path d="M124 283 C124 274 120 268 125 264 C130 260 136 264 138 270 C140 276 138 283 128 283 Z" fill="#1a4a2a" opacity="0.8"/>
  <!-- Gold trophy small -->
  <rect x="154" y="272" width="12" height="12" rx="1" fill="#5a4a10" opacity="0.7"/>
  <ellipse cx="160" cy="272" rx="8" ry="4" fill="#C9943A" opacity="0.5"/>
  <rect x="157" y="262" width="6" height="11" rx="1" fill="#C9943A" opacity="0.4"/>
  <ellipse cx="160" cy="261" rx="10" ry="5" fill="#C9943A" opacity="0.4"/>

  -- Lamp above table -->
  <line x1="350" y1="0" x2="350" y2="100" stroke="#2a1f0a" stroke-width="4" opacity="0.8"/>
  <ellipse cx="350" cy="100" rx="55" ry="16" fill="#2a1a08" opacity="0.9"/>
  <path d="M295 100 L265 180 L435 180 L405 100 Z" fill="#E8B84B" fill-opacity="0.04"/>
  <!-- Lamp warm light cone -->
  <ellipse cx="350" cy="105" rx="60" ry="16" fill="#E8B84B" opacity="0.18" filter="url(#blurSm)"/>
  <!-- Lamp glow -->
  <ellipse cx="350" cy="160" rx="180" ry="80" fill="url(#lampGlow)" filter="url(#blur)" opacity="0.6"/>

  -- Workbench -->
  <rect x="200" y="340" width="480" height="22" rx="3" fill="#2a1f0a"/>
  <rect x="200" y="355" width="480" height="10" rx="2" fill="#1a1208"/>

  -- Table glow from lamp -->
  <ellipse cx="420" cy="350" rx="200" ry="25" fill="#E8B84B" fill-opacity="0.05" filter="url(#blurSm)"/>

  -- ADULT (parent) - LEFT, larger, leaning over table -->
  <!-- Stool -->
  <ellipse cx="310" cy="365" rx="28" ry="8" fill="#2a1f0a" opacity="0.8"/>
  <rect x="290" y="365" width="7" height="50" rx="2" fill="#2a1f0a" opacity="0.8"/>
  <rect x="313" y="365" width="7" height="50" rx="2" fill="#2a1f0a" opacity="0.8"/>
  <!-- Body - leaning forward -->
  <path d="M280 260 C278 280 282 320 290 355 L330 355 L338 320 L340 260 Z" fill="#1e2530" opacity="0.9"/>
  <!-- Shoulder/arm reaching to table -->
  <path d="M340 290 C365 285 390 292 420 318" stroke="#1e2530" stroke-width="22" fill="none" stroke-linecap="round" opacity="0.9"/>
  <!-- Left arm bent on table -->
  <path d="M280 295 C260 305 248 320 252 350" stroke="#1e2530" stroke-width="20" fill="none" stroke-linecap="round" opacity="0.85"/>
  <!-- Head -->
  <ellipse cx="310" cy="244" rx="24" ry="27" fill="#251a08" opacity="0.9"/>
  <!-- Hair adult - longer -->
  <path d="M286 235 C284 215 292 208 310 206 C328 208 336 216 334 235" fill="#1a0e04" opacity="0.95"/>
  <path d="M284 245 C280 255 282 268 286 270 C283 265 284 252 287 248 Z" fill="#1a0e04" opacity="0.8"/>
  <path d="M334 248 C338 255 337 265 334 270 C336 265 337 252 335 248 Z" fill="#1a0e04" opacity="0.8"/>
  <!-- Neck -->
  <rect x="303" y="268" width="14" height="18" rx="4" fill="#251a08" opacity="0.9"/>
  <!-- Hand on figurine -->
  <ellipse cx="418" cy="322" rx="12" ry="9" fill="#251a08" opacity="0.85"/>
  <!-- Brush in adult hand -->
  <line x1="424" y1="316" x2="448" y2="302" stroke="#8B6914" stroke-width="4" opacity="0.8"/>
  <ellipse cx="450" cy="300" rx="5" ry="10" fill="#C9943A" opacity="0.7" transform="rotate(-30 450 300)"/>
  <!-- Paint tip glow -->
  <circle cx="453" cy="296" r="5" fill="#E8B84B" opacity="0.3" filter="url(#softglow)"/>

  -- CHILD - RIGHT, smaller, seated close -->
  <!-- Stool child -->
  <ellipse cx="510" cy="368" rx="22" ry="6" fill="#2a1f0a" opacity="0.8"/>
  <rect x="494" y="368" width="6" height="40" rx="2" fill="#2a1f0a" opacity="0.8"/>
  <rect x="510" y="368" width="6" height="40" rx="2" fill="#2a1f0a" opacity="0.8"/>
  <!-- Child body -->
  <rect x="486" y="288" width="48" height="80" rx="8" fill="#2a2040" opacity="0.9"/>
  <!-- Child head (smaller) -->
  <ellipse cx="510" cy="272" rx="20" ry="22" fill="#251a08" opacity="0.9"/>
  <!-- Child hair -->
  <path d="M490 264 C490 248 498 242 510 241 C522 242 530 248 530 264" fill="#1a0e04" opacity="0.95"/>
  <!-- Child neck -->
  <rect x="504" y="292" width="12" height="14" rx="4" fill="#251a08" opacity="0.85"/>
  <!-- Child arm pointing at figurine -->
  <path d="M534 315 C550 310 568 312 580 318" stroke="#251a08" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.85"/>
  <!-- Child other arm on table -->
  <path d="M486 318 C472 322 465 330 466 355" stroke="#251a08" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.8"/>
  <!-- Child hand pointing -->
  <ellipse cx="582" cy="319" rx="9" ry="7" fill="#251a08" opacity="0.8"/>

  -- FIGURINE being worked on (large, center of table) -->
  <ellipse cx="460" cy="342" rx="32" ry="9" fill="#2a1f0a" opacity="0.8"/>
  <!-- Figurine body -->
  <path d="M440 300 C440 285 446 275 460 272 C474 275 480 285 480 300 L478 342 L442 342 Z" fill="#3a4a3a" opacity="0.9"/>
  <!-- Figurine cape -->
  <path d="M440 294 C432 305 428 325 432 342 L443 342 L445 305 Z" fill="#8B1A1A" opacity="0.8"/>
  <path d="M480 294 C488 305 492 325 488 342 L477 342 L475 305 Z" fill="#8B1A1A" opacity="0.8"/>
  <!-- Figurine head -->
  <ellipse cx="460" cy="266" rx="14" ry="15" fill="#3a4a3a" opacity="0.9"/>
  <rect x="453" y="262" width="14" height="5" rx="1" fill="#252a20" opacity="0.8"/>
  <!-- Figurine sword -->
  <rect x="482" y="255" width="5" height="68" rx="2" fill="#7a7868" opacity="0.85"/>
  <rect x="476" y="288" width="17" height="4" rx="1" fill="#C9943A" opacity="0.7"/>
  <!-- Fresh paint highlight -->
  <circle cx="457" cy="298" r="3" fill="#E8D5A3" opacity="0.5" filter="url(#softglow)"/>

  -- Paint supplies on table -->
  <!-- Palette -->
  <ellipse cx="390" cy="346" rx="32" ry="16" fill="#1e1608" opacity="0.9"/>
  <circle cx="372" cy="338" r="6" fill="#8B1A1A" opacity="0.8"/>
  <circle cx="386" cy="334" r="6" fill="#1a3a6a" opacity="0.8"/>
  <circle cx="400" cy="334" r="6" fill="#C9943A" opacity="0.8"/>
  <circle cx="413" cy="338" r="6" fill="#2a5a2a" opacity="0.8"/>
  <!-- Water jar -->
  <rect x="608" y="316" width="22" height="28" rx="4" fill="#0d1520" opacity="0.85"/>
  <ellipse cx="619" cy="316" rx="11" ry="4" fill="#102030" opacity="0.8"/>
  <!-- Water tinted blue-grey -->
  <ellipse cx="619" cy="330" rx="9" ry="4" fill="#1a3a5a" opacity="0.3" filter="url(#blurSm)"/>

  -- Warm ambient glow on table from above -->
  <ellipse cx="430" cy="350" rx="180" ry="30" fill="url(#tableGlow)" filter="url(#blur)" opacity="0.8"/>

  -- Floating motes -->
  <circle cx="380" cy="270" r="1.5" fill="#E8B84B" opacity="0.3"/>
  <circle cx="470" cy="250" r="1" fill="#E8B84B" opacity="0.4"/>
  <circle cx="540" cy="280" r="1.5" fill="#E8B84B" opacity="0.25"/>

  -- Label -->
  <text x="350" y="505" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#C9943A" fill-opacity="0.35" letter-spacing="2">PRO RODIČE — 700 × 520 px</text>
</svg>
