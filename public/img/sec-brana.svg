<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="55%" r="70%">
      <stop offset="0%" stop-color="#0e1208"/>
      <stop offset="100%" stop-color="#060808"/>
    </radialGradient>
    <radialGradient id="gl" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9943A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#C9943A" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="35"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="16"/></filter>
    <filter id="blur3"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="600" height="400" fill="url(#bg)"/>
  <ellipse cx="300" cy="220" rx="155" ry="210" fill="url(#gl)" filter="url(#blur1)"/>

  <!-- LEFT PILLAR -->
  <rect x="186" y="80" width="64" height="290" rx="4" fill="#24200e"/>
  <line x1="188" y1="106" x2="248" y2="106" stroke="#181408" stroke-width="1" opacity="0.8"/>
  <line x1="188" y1="132" x2="248" y2="132" stroke="#2e2a14" stroke-width="1" opacity="0.8"/>
  <line x1="188" y1="158" x2="248" y2="158" stroke="#181408" stroke-width="1" opacity="0.8"/>
  <line x1="188" y1="184" x2="248" y2="184" stroke="#2e2a14" stroke-width="1" opacity="0.8"/>
  <line x1="188" y1="210" x2="248" y2="210" stroke="#181408" stroke-width="1" opacity="0.8"/>
  <line x1="188" y1="236" x2="248" y2="236" stroke="#2e2a14" stroke-width="1" opacity="0.8"/>
  <line x1="188" y1="262" x2="248" y2="262" stroke="#181408" stroke-width="1" opacity="0.8"/>
  <line x1="188" y1="288" x2="248" y2="288" stroke="#2e2a14" stroke-width="1" opacity="0.8"/>
  <line x1="188" y1="314" x2="248" y2="314" stroke="#181408" stroke-width="1" opacity="0.8"/>
  <line x1="188" y1="340" x2="248" y2="340" stroke="#2e2a14" stroke-width="1" opacity="0.8"/>
  <line x1="249" y1="80" x2="249" y2="370" stroke="#C9943A" stroke-opacity="0.14" stroke-width="2"/>
  <!-- Left rune marks -->
  <rect x="205" y="136" width="18" height="2" rx="1" fill="#C9943A" opacity="0.25"/>
  <rect x="201" y="142" width="26" height="1.5" rx="1" fill="#C9943A" opacity="0.18"/>
  <rect x="205" y="240" width="18" height="2" rx="1" fill="#C9943A" opacity="0.22"/>
  <rect x="201" y="246" width="26" height="1.5" rx="1" fill="#C9943A" opacity="0.16"/>

  <!-- RIGHT PILLAR -->
  <rect x="350" y="80" width="64" height="290" rx="4" fill="#24200e"/>
  <line x1="352" y1="106" x2="412" y2="106" stroke="#181408" stroke-width="1" opacity="0.8"/>
  <line x1="352" y1="132" x2="412" y2="132" stroke="#2e2a14" stroke-width="1" opacity="0.8"/>
  <line x1="352" y1="158" x2="412" y2="158" stroke="#181408" stroke-width="1" opacity="0.8"/>
  <line x1="352" y1="184" x2="412" y2="184" stroke="#2e2a14" stroke-width="1" opacity="0.8"/>
  <line x1="352" y1="210" x2="412" y2="210" stroke="#181408" stroke-width="1" opacity="0.8"/>
  <line x1="352" y1="236" x2="412" y2="236" stroke="#2e2a14" stroke-width="1" opacity="0.8"/>
  <line x1="352" y1="262" x2="412" y2="262" stroke="#181408" stroke-width="1" opacity="0.8"/>
  <line x1="352" y1="288" x2="412" y2="288" stroke="#2e2a14" stroke-width="1" opacity="0.8"/>
  <line x1="352" y1="314" x2="412" y2="314" stroke="#181408" stroke-width="1" opacity="0.8"/>
  <line x1="352" y1="340" x2="412" y2="340" stroke="#2e2a14" stroke-width="1" opacity="0.8"/>
  <line x1="351" y1="80" x2="351" y2="370" stroke="#C9943A" stroke-opacity="0.14" stroke-width="2"/>
  <rect x="377" y="136" width="18" height="2" rx="1" fill="#C9943A" opacity="0.22"/>
  <rect x="373" y="142" width="26" height="1.5" rx="1" fill="#C9943A" opacity="0.16"/>
  <rect x="377" y="240" width="18" height="2" rx="1" fill="#C9943A" opacity="0.25"/>
  <rect x="373" y="246" width="26" height="1.5" rx="1" fill="#C9943A" opacity="0.18"/>

  <!-- GOTHIC ARCH CROWN - left stone -->
  <path d="M186 80 Q 246 36 300 30 L 300 52 Q 258 58 222 80 Z" fill="#24200e"/>
  <!-- Right stone -->
  <path d="M414 80 Q 354 36 300 30 L 300 52 Q 342 58 378 80 Z" fill="#24200e"/>
  <!-- Keystone at peak -->
  <path d="M288 32 L300 18 L312 32 L306 46 L300 38 L294 46 Z" fill="#2e2810"/>
  <!-- Inner arch curve highlight -->
  <path d="M254 80 Q 278 54 300 46 Q 322 54 346 80" fill="none" stroke="#C9943A" stroke-opacity="0.18" stroke-width="1.5"/>

  <!-- Arch interior -->
  <path d="M254 80 L254 370 L346 370 L346 80 Q 322 60 300 52 Q 278 60 254 80 Z" fill="#0a0c08" opacity="0.45"/>
  <ellipse cx="300" cy="230" rx="62" ry="165" fill="#C9943A" opacity="0.07"/>

  <!-- Light rays through arch -->
  <path d="M274 50 L240 280 L360 280 L326 50" fill="#E8B84B" fill-opacity="0.025"/>

  <!-- Ground mist -->
  <ellipse cx="300" cy="368" rx="95" ry="15" fill="#C9943A" fill-opacity="0.12" filter="url(#blur3)"/>

  <!-- DRAGON on arch peak (sitting, looking down) -->
  <!-- Wings spread behind body -->
  <path d="M310 38 C326 26 352 22 358 34 C346 42 324 40 312 36 Z" fill="#1a3a20" opacity="0.75"/>
  <path d="M290 38 C274 26 248 22 242 34 C254 42 276 40 288 36 Z" fill="#1a3a20" opacity="0.75"/>
  <line x1="312" y1="36" x2="354" y2="24" stroke="#2a5a30" stroke-opacity="0.5" stroke-width="1"/>
  <line x1="288" y1="36" x2="246" y2="24" stroke="#2a5a30" stroke-opacity="0.5" stroke-width="1"/>
  <!-- Body (sitting on keystone) -->
  <path d="M282 42 C276 30 280 20 290 17 C300 14 312 18 313 30 C314 42 308 52 298 55 C290 57 283 50 282 42 Z" fill="#1a4a2a" opacity="0.9"/>
  <!-- Head (looking toward viewer) -->
  <path d="M280 18 C276 10 281 4 291 2 C301 0 307 6 305 16 C303 22 296 24 290 23 C285 22 280 20 280 18 Z" fill="#246030" opacity="0.9"/>
  <!-- Dragon eye -->
  <ellipse cx="294" cy="10" rx="5" ry="4" fill="#E8B84B" opacity="0.9" filter="url(#glow)"/>
  <ellipse cx="294" cy="10" rx="2" ry="3" fill="#0a0a0a"/>
  <!-- Tail curling down -->
  <path d="M296 55 C300 65 294 75 286 76 C283 68 285 58 290 53 Z" fill="#1a4a2a" opacity="0.8"/>

  <!-- 4 Gateway orbs -->
  <!-- Brána I – Green -->
  <circle cx="162" cy="342" r="20" fill="#3D7A4A" opacity="0.12" filter="url(#blur3)"/>
  <circle cx="162" cy="342" r="11" fill="#3D7A4A" opacity="0.8"/>
  <circle cx="162" cy="342" r="14" fill="none" stroke="#5aaa6a" stroke-width="1.2" opacity="0.5"/>
  <circle cx="158" cy="338" r="5" fill="#80e894" opacity="0.5"/>
  <text x="162" y="370" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#5aaa6a" opacity="0.7" letter-spacing="1">I</text>

  <!-- Brána II – Gold -->
  <circle cx="246" cy="358" r="20" fill="#C9943A" opacity="0.12" filter="url(#blur3)"/>
  <circle cx="246" cy="358" r="11" fill="#C9943A" opacity="0.8"/>
  <circle cx="246" cy="358" r="14" fill="none" stroke="#e8b840" stroke-width="1.2" opacity="0.5"/>
  <circle cx="242" cy="354" r="5" fill="#ffe080" opacity="0.5"/>
  <text x="246" y="386" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#e8b840" opacity="0.7" letter-spacing="1">II</text>

  <!-- Brána III – Blue -->
  <circle cx="354" cy="358" r="20" fill="#3A6B9A" opacity="0.12" filter="url(#blur3)"/>
  <circle cx="354" cy="358" r="11" fill="#3A6B9A" opacity="0.8"/>
  <circle cx="354" cy="358" r="14" fill="none" stroke="#5a9aca" stroke-width="1.2" opacity="0.5"/>
  <circle cx="350" cy="354" r="5" fill="#90c8ff" opacity="0.5"/>
  <text x="354" y="386" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#5a9aca" opacity="0.7" letter-spacing="1">III</text>

  <!-- Brána IV – Purple -->
  <circle cx="438" cy="342" r="20" fill="#7A5A9A" opacity="0.12" filter="url(#blur3)"/>
  <circle cx="438" cy="342" r="11" fill="#7A5A9A" opacity="0.8"/>
  <circle cx="438" cy="342" r="14" fill="none" stroke="#9a7aca" stroke-width="1.2" opacity="0.5"/>
  <circle cx="434" cy="338" r="5" fill="#d0a0ff" opacity="0.5"/>
  <text x="438" y="370" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#9a7aca" opacity="0.7" letter-spacing="1">IV</text>

  <!-- Floating particles -->
  <circle cx="278" cy="128" r="1.5" fill="#E8B84B" opacity="0.55"/>
  <circle cx="319" cy="108" r="1" fill="#E8B84B" opacity="0.45"/>
  <circle cx="344" cy="172" r="1.5" fill="#E8B84B" opacity="0.35"/>
  <circle cx="263" cy="185" r="1" fill="#C9943A" opacity="0.4"/>
  <circle cx="300" cy="295" r="1.5" fill="#E8B84B" opacity="0.3"/>
  <circle cx="312" cy="322" r="1" fill="#C9943A" opacity="0.3"/>
</svg>
