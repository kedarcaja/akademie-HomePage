<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="52%" r="72%">
      <stop offset="0%" stop-color="#0e1208"/>
      <stop offset="100%" stop-color="#050708"/>
    </radialGradient>
    <radialGradient id="arch-glow" cx="50%" cy="60%" r="55%">
      <stop offset="0%" stop-color="#C9943A" stop-opacity="0.38"/>
      <stop offset="60%" stop-color="#C9943A" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#C9943A" stop-opacity="0"/>
    </radialGradient>
    <filter id="f1"><feGaussianBlur stdDeviation="40"/></filter>
    <filter id="f2"><feGaussianBlur stdDeviation="18"/></filter>
    <filter id="f3"><feGaussianBlur stdDeviation="7"/></filter>
    <filter id="fg"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="600" height="400" fill="url(#bg)"/>

  <!-- Arch glow (interior) -->
  <ellipse cx="300" cy="250" rx="120" ry="190" fill="url(#arch-glow)" filter="url(#f1)"/>

  <!-- LEFT PILLAR -->
  <rect x="168" y="70" width="78" height="310" rx="4" fill="#20180a"/>
  <!-- Pillar stone lines -->
  <line x1="170" y1="100" x2="244" y2="100" stroke="#160e04" stroke-width="2" opacity="0.9"/>
  <line x1="170" y1="132" x2="244" y2="132" stroke="#2c2010" stroke-width="1" opacity="0.7"/>
  <line x1="170" y1="164" x2="244" y2="164" stroke="#160e04" stroke-width="2" opacity="0.9"/>
  <line x1="170" y1="196" x2="244" y2="196" stroke="#2c2010" stroke-width="1" opacity="0.7"/>
  <line x1="170" y1="228" x2="244" y2="228" stroke="#160e04" stroke-width="2" opacity="0.9"/>
  <line x1="170" y1="260" x2="244" y2="260" stroke="#2c2010" stroke-width="1" opacity="0.7"/>
  <line x1="170" y1="292" x2="244" y2="292" stroke="#160e04" stroke-width="2" opacity="0.9"/>
  <line x1="170" y1="324" x2="244" y2="324" stroke="#2c2010" stroke-width="1" opacity="0.7"/>
  <!-- Left gold edge -->
  <rect x="244" y="70" width="2" height="310" rx="1" fill="#C9943A" fill-opacity="0.18"/>
  <!-- Left runes -->
  <rect x="190" y="130" width="22" height="3" rx="1" fill="#C9943A" opacity="0.3"/>
  <rect x="186" y="137" width="30" height="2" rx="1" fill="#C9943A" opacity="0.22"/>
  <rect x="190" y="248" width="22" height="3" rx="1" fill="#C9943A" opacity="0.28"/>
  <rect x="186" y="255" width="30" height="2" rx="1" fill="#C9943A" opacity="0.2"/>

  <!-- RIGHT PILLAR -->
  <rect x="354" y="70" width="78" height="310" rx="4" fill="#20180a"/>
  <line x1="356" y1="100" x2="430" y2="100" stroke="#160e04" stroke-width="2" opacity="0.9"/>
  <line x1="356" y1="132" x2="430" y2="132" stroke="#2c2010" stroke-width="1" opacity="0.7"/>
  <line x1="356" y1="164" x2="430" y2="164" stroke="#160e04" stroke-width="2" opacity="0.9"/>
  <line x1="356" y1="196" x2="430" y2="196" stroke="#2c2010" stroke-width="1" opacity="0.7"/>
  <line x1="356" y1="228" x2="430" y2="228" stroke="#160e04" stroke-width="2" opacity="0.9"/>
  <line x1="356" y1="260" x2="430" y2="260" stroke="#2c2010" stroke-width="1" opacity="0.7"/>
  <line x1="356" y1="292" x2="430" y2="292" stroke="#160e04" stroke-width="2" opacity="0.9"/>
  <line x1="356" y1="324" x2="430" y2="324" stroke="#2c2010" stroke-width="1" opacity="0.7"/>
  <rect x="354" y="70" width="2" height="310" rx="1" fill="#C9943A" fill-opacity="0.18"/>
  <rect x="378" y="130" width="22" height="3" rx="1" fill="#C9943A" opacity="0.28"/>
  <rect x="374" y="137" width="30" height="2" rx="1" fill="#C9943A" opacity="0.2"/>
  <rect x="378" y="248" width="22" height="3" rx="1" fill="#C9943A" opacity="0.3"/>
  <rect x="374" y="255" width="30" height="2" rx="1" fill="#C9943A" opacity="0.22"/>

  <!-- ARCH CROWN (gothic pointed) -->
  <!-- Left arch stone -->
  <path d="M168 70 Q 240 24 300 18 L300 44 Q 252 50 216 70 Z" fill="#20180a"/>
  <!-- Right arch stone -->
  <path d="M432 70 Q 360 24 300 18 L300 44 Q 348 50 384 70 Z" fill="#20180a"/>
  <!-- Keystone -->
  <path d="M287 20 L300 6 L313 20 L307 36 L300 28 L293 36 Z" fill="#2a2010"/>
  <!-- Inner arch edge -->
  <path d="M248 70 Q 272 48 300 40 Q 328 48 352 70" fill="none" stroke="#C9943A" stroke-opacity="0.22" stroke-width="2"/>

  <!-- Arch interior (dark passage) -->
  <path d="M246 70 L246 380 L354 380 L354 70 Q 328 52 300 44 Q 272 52 246 70 Z" fill="#08090C" opacity="0.55"/>

  <!-- Interior warm light rays -->
  <path d="M272 42 L236 300 L364 300 L328 42" fill="#E8B84B" fill-opacity="0.03"/>
  <ellipse cx="300" cy="240" rx="55" ry="150" fill="#C9943A" fill-opacity="0.08"/>

  <!-- Ground mist -->
  <ellipse cx="300" cy="378" rx="92" ry="14" fill="#C9943A" fill-opacity="0.14" filter="url(#f3)"/>

  <!-- DRAGON on arch peak -->
  <!-- Wings -->
  <path d="M312 40 C330 27 356 24 361 36 C348 44 325 42 314 38 Z" fill="#1a3a20" opacity="0.78"/>
  <path d="M288 40 C270 27 244 24 239 36 C252 44 275 42 286 38 Z" fill="#1a3a20" opacity="0.78"/>
  <!-- Body on keystone -->
  <path d="M282 44 C276 32 280 22 290 19 C300 16 312 20 313 32 C314 44 308 54 298 57 C290 59 283 51 282 44 Z" fill="#1a4a2a" opacity="0.92"/>
  <!-- Head -->
  <path d="M280 20 C276 12 281 5 291 3 C301 1 308 7 306 17 C304 23 297 26 291 25 Z" fill="#246030" opacity="0.92"/>
  <!-- Eye -->
  <ellipse cx="294" cy="11" rx="6" ry="5" fill="#E8B84B" opacity="0.96" filter="url(#fg)"/>
  <ellipse cx="294" cy="11" rx="2.5" ry="3.5" fill="#080506"/>
  <circle cx="294" cy="11" r="11" fill="#E8B84B" opacity="0.22" filter="url(#f2)"/>
  <!-- Tail -->
  <path d="M296 57 C301 68 294 79 286 80 C283 71 286 60 291 55 Z" fill="#1a4a2a" opacity="0.82"/>

  <!-- FOUR GATEWAY ORBS at base -->
  <!-- I – Green -->
  <circle cx="148" cy="348" r="22" fill="#3D7A4A" opacity="0.12" filter="url(#f3)"/>
  <circle cx="148" cy="348" r="14" fill="#3D7A4A" opacity="0.82"/>
  <circle cx="148" cy="348" r="18" fill="none" stroke="#5aaa6a" stroke-width="1.5" opacity="0.55"/>
  <circle cx="144" cy="344" r="6" fill="#80e894" opacity="0.45"/>
  <text x="148" y="376" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#5aaa6a" opacity="0.75" letter-spacing="1">I</text>

  <!-- II – Gold -->
  <circle cx="238" cy="364" r="22" fill="#C9943A" opacity="0.12" filter="url(#f3)"/>
  <circle cx="238" cy="364" r="14" fill="#C9943A" opacity="0.82"/>
  <circle cx="238" cy="364" r="18" fill="none" stroke="#e8b840" stroke-width="1.5" opacity="0.55"/>
  <circle cx="234" cy="360" r="6" fill="#ffe080" opacity="0.45"/>
  <text x="238" y="392" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#e8b840" opacity="0.75" letter-spacing="1">II</text>

  <!-- III – Blue -->
  <circle cx="362" cy="364" r="22" fill="#3A6B9A" opacity="0.12" filter="url(#f3)"/>
  <circle cx="362" cy="364" r="14" fill="#3A6B9A" opacity="0.82"/>
  <circle cx="362" cy="364" r="18" fill="none" stroke="#5a9aca" stroke-width="1.5" opacity="0.55"/>
  <circle cx="358" cy="360" r="6" fill="#90c8ff" opacity="0.45"/>
  <text x="362" y="392" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#5a9aca" opacity="0.75" letter-spacing="1">III</text>

  <!-- IV – Purple -->
  <circle cx="452" cy="348" r="22" fill="#7A5A9A" opacity="0.12" filter="url(#f3)"/>
  <circle cx="452" cy="348" r="14" fill="#7A5A9A" opacity="0.82"/>
  <circle cx="452" cy="348" r="18" fill="none" stroke="#9a7aca" stroke-width="1.5" opacity="0.55"/>
  <circle cx="448" cy="344" r="6" fill="#d0a0ff" opacity="0.45"/>
  <text x="452" y="376" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#9a7aca" opacity="0.75" letter-spacing="1">IV</text>

  <!-- Floating particles -->
  <circle cx="276" cy="122" r="1.5" fill="#E8B84B" opacity="0.55"/>
  <circle cx="320" cy="102" r="1" fill="#E8B84B" opacity="0.45"/>
  <circle cx="346" cy="168" r="1.5" fill="#E8B84B" opacity="0.35"/>
  <circle cx="262" cy="180" r="1" fill="#C9943A" opacity="0.4"/>
  <circle cx="300" cy="292" r="1.5" fill="#E8B84B" opacity="0.3"/>
  <circle cx="315" cy="320" r="1" fill="#C9943A" opacity="0.3"/>
</svg>
