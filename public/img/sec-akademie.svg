<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="72%">
      <stop offset="0%" stop-color="#1a1005"/>
      <stop offset="100%" stop-color="#05070C"/>
    </radialGradient>
    <radialGradient id="ga" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9943A" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#C9943A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3D7A4A" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#3D7A4A" stop-opacity="0"/>
    </radialGradient>
    <filter id="f1"><feGaussianBlur stdDeviation="40"/></filter>
    <filter id="f2"><feGaussianBlur stdDeviation="18"/></filter>
    <filter id="fg"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="600" height="400" fill="url(#bg)"/>
  <ellipse cx="290" cy="210" rx="230" ry="190" fill="url(#ga)" filter="url(#f1)"/>
  <ellipse cx="450" cy="250" rx="140" ry="120" fill="url(#gg)" filter="url(#f2)"/>

  <!-- Workbench -->
  <rect x="60" y="308" width="480" height="16" rx="3" fill="#1e1608"/>
  <rect x="60" y="322" width="480" height="6" rx="2" fill="#100c04"/>
  <rect x="90" y="328" width="12" height="52" rx="2" fill="#1e1608"/>
  <rect x="498" y="328" width="12" height="52" rx="2" fill="#1e1608"/>
  <ellipse cx="300" cy="312" rx="200" ry="14" fill="#E8B84B" fill-opacity="0.07" filter="url(#f2)"/>

  <!-- Figurine pedestal -->
  <ellipse cx="268" cy="306" rx="34" ry="8" fill="#2a1e08"/>
  <rect x="248" y="284" width="40" height="24" rx="3" fill="#1e1608"/>
  <ellipse cx="268" cy="284" rx="27" ry="6" fill="#332412"/>

  <!-- Knight body (clean chess-piece silhouette) -->
  <path d="M244 284 L240 216 L296 216 L292 284 Z" fill="#3a2c12"/>
  <!-- Armor chest -->
  <path d="M250 276 L249 234 L287 234 L286 276 Z" fill="#4a3a18" opacity="0.85"/>
  <!-- Belt line -->
  <rect x="242" y="258" width="52" height="5" rx="2" fill="#C9943A" opacity="0.55"/>
  <!-- Cape (flowing right) -->
  <path d="M290 232 C308 238 316 260 310 292 L292 284 L290 232 Z" fill="#7D2128" opacity="0.9"/>
  <!-- Shoulder pads -->
  <ellipse cx="241" cy="220" rx="18" ry="11" fill="#3a2c12"/>
  <ellipse cx="295" cy="220" rx="18" ry="11" fill="#3a2c12"/>
  <!-- Neck -->
  <rect x="258" y="208" width="20" height="10" rx="2" fill="#3a2c12"/>
  <!-- Helmet (large, bold) -->
  <ellipse cx="268" cy="194" rx="28" ry="30" fill="#3a2c12"/>
  <!-- Visor slot -->
  <rect x="253" y="190" width="28" height="9" rx="2" fill="#080604" opacity="0.95"/>
  <!-- Helmet ridge top -->
  <path d="M255 176 C256 162 262 154 268 150 C274 154 280 162 281 176 Z" fill="#7D2128" opacity="0.85"/>
  <!-- Helmet gold trim -->
  <path d="M240 194 C240 178 252 164 268 164 C284 164 296 178 296 194" fill="none" stroke="#C9943A" stroke-width="2" stroke-opacity="0.4"/>
  <!-- Sword (right) -->
  <rect x="302" y="148" width="9" height="130" rx="3" fill="#8a7868" opacity="0.82"/>
  <rect x="294" y="190" width="24" height="8" rx="2" fill="#C9943A" opacity="0.78"/>
  <!-- Sword tip glow -->
  <circle cx="306" cy="152" r="5" fill="#E8D5A0" opacity="0.45" filter="url(#fg)"/>

  <!-- Wet paint glints on figurine -->
  <circle cx="252" cy="270" r="7" fill="#8B1A1A" opacity="0.75"/>
  <circle cx="278" cy="264" r="6" fill="#C9943A" opacity="0.8"/>
  <circle cx="263" cy="278" r="5" fill="#1a3a6a" opacity="0.65"/>

  <!-- Paintbrush (leaning, lower-left) -->
  <g transform="rotate(-28 178 260)">
    <rect x="170" y="118" width="10" height="144" rx="5" fill="#8B6010" opacity="0.8"/>
    <rect x="170" y="258" width="10" height="15" rx="2" fill="#8a7060" opacity="0.82"/>
    <ellipse cx="175" cy="277" rx="10" ry="20" fill="#8B1A1A" opacity="0.82"/>
    <ellipse cx="175" cy="288" rx="7" ry="8" fill="#C0381A" opacity="0.55"/>
  </g>

  <!-- Paint palette (lower-left) -->
  <ellipse cx="162" cy="298" rx="60" ry="22" fill="#1a1205"/>
  <ellipse cx="162" cy="296" rx="56" ry="18" fill="#221808"/>
  <circle cx="132" cy="287" r="10" fill="#8B1A1A" opacity="0.9"/>
  <circle cx="150" cy="283" r="10" fill="#1a3a6a" opacity="0.9"/>
  <circle cx="168" cy="283" r="10" fill="#2d6a2d" opacity="0.9"/>
  <circle cx="185" cy="287" r="10" fill="#C9943A" opacity="0.9"/>
  <circle cx="192" cy="300" r="10" fill="#4a1a6a" opacity="0.85"/>
  <ellipse cx="175" cy="308" rx="10" ry="7" fill="#100c04"/>

  <!-- Dragon companion (right side, watching) -->
  <path d="M464 224 C456 204 461 188 474 184 C487 180 500 188 501 204 C502 218 495 232 481 236 C473 239 464 230 464 224 Z" fill="#1a4a2a" opacity="0.93"/>
  <path d="M500 204 C515 194 532 191 536 202 C523 211 506 209 502 206 Z" fill="#153a20" opacity="0.72"/>
  <path d="M464 208 C450 198 433 196 429 207 C442 215 460 213 462 210 Z" fill="#153a20" opacity="0.72"/>
  <path d="M460 184 C455 173 460 164 471 162 C482 160 490 167 488 179 C487 187 479 190 473 190 Z" fill="#246030" opacity="0.93"/>
  <ellipse cx="475" cy="172" rx="7" ry="5.5" fill="#E8B84B" opacity="0.96" filter="url(#fg)"/>
  <ellipse cx="475" cy="172" rx="3" ry="4" fill="#080506"/>
  <circle cx="475" cy="172" r="13" fill="#E8B84B" opacity="0.2" filter="url(#f2)"/>
  <path d="M472 232 C478 248 470 260 461 261 C457 251 460 238 467 233 Z" fill="#1a4a2a" opacity="0.82"/>

  <!-- Floating particles -->
  <circle cx="390" cy="154" r="1.5" fill="#E8B84B" opacity="0.55"/>
  <circle cx="425" cy="130" r="1" fill="#E8B84B" opacity="0.45"/>
  <circle cx="355" cy="142" r="1.5" fill="#E8B84B" opacity="0.35"/>
  <circle cx="440" cy="188" r="1" fill="#C9943A" opacity="0.4"/>
  <circle cx="240" cy="150" r="1.5" fill="#E8B84B" opacity="0.3"/>
  <circle cx="200" cy="168" r="1" fill="#C9943A" opacity="0.3"/>
</svg>
